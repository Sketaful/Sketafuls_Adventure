    -= NECK =-
    A neck can be tamed with Raspberry, Blueberries, Carrot, Turnip, Mushroom, Onion and Cloudberry and are breedable when tamed (using the same food).
    
    Taming a neck take around 30 minutes and they then feed once every 10 minutes. There is a 33% chance of a neck starting to breed when fed and happy and they are pregnant around 2 minute before having a pup.
    The pup need 1 hour to become a fully grown neck.
    
    Tame necks can be commanded to follow you and will attack monsters and other creatures (not other necks though). 
    Be careful since they don't have much health and will die quickly in a fight.
    Commandable:	True
    Taming time:	30 min
    Feed duration:	10 min
    Pregnancy duration: 2 min
    Grow time:	3000s
    
